<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a5298">
  <title>Edeh Dev Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
    }

    .container {
      padding: 20px;
      padding-bottom: 80px;
    }

    header {
      background: #0f172a;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: #2e4c8f;
      color: white;
    }

    /* SECTIONS FIXED */
    #home-section,
    #lessons-section,
    #progress-section,
    #achievements-section {
      display: none;
    }

    .active {
      display: block !important;
    }

    /* NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #0f172a;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
    }

    .bottom-nav button {
      background: none;
      border: none;
      font-size: 22px;
      color: white;
    }
    
    button {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  padding: 12px 18px;
  border-radius: 12px;
  color: white;
  font-weight: 600;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: rgba(255, 255, 255, 0.2);
}content://com.android.externalstorage.documents/tree/primary%3Aindex.html%2Findex.html::primary:index.html/index.html/TechJourney/index.html

    .progress-container {
      background: rgba(255,255,255,0.2);
      height: 10px;
      border-radius: 10px;
    }

    .progress-bar {
      height: 10px;
      width: 0%;
      background: cyan;
      border-radius: 10px;
    }
    
    .bottom-nav button.active-nav {
  color: #4facfe;
  transform: scale(1.2);
}


  </style>
</head>

<body>

<div class="container">

  <!-- HOME -->
  <div id="home-section" class="active">
    <header>
      <h1 id="dayTitle"></h1>
      <p id="greeting"></p>
    </header>

    <p id="time"></p>
    <p id="gymNote"></p>
    <p id="discipline"></p>
    <p id="consistency"></p>

    <button onclick="saveDailyNote()">Update Daily Note</button>
    
   <button onclick="editName()">Change Name</button>
   
   <button onclick="viewDay()">📅 View Day</button>
   
   
   <button onclick="backupData()">💾 Backup</button>
   
   <button onclick="restoreData()">📁 Restore</button>
   
  </div>

  <!-- LESSONS -->
  <div id="lessons-section">
    <h3>🧠 Lessons</h3>
    <ul id="movie-lesson"></ul>
    <button onclick="updateLesson()">Add Lesson</button>
    <button onclick="clearLessons()">Clear Lessons</button>
  </div>

  <!-- PROGRESS -->
  <div id="progress-section">
    <p id="dev-level"></p>

    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
      <div class="progress-bar" id="progress-bar">
  <span id="progress-text"></span>
</div>
    </div>

    <p id="streak"></p>

    <button onclick="increaseGymDay()">+ Gym Day</button>
    <button onclick="resetGymDay()">Reset Gym</button>
  </div>

  <!-- ACHIEVEMENTS -->
  <div id="achievements-section">
    <h2>🏆 Achievements</h2>
    <ul id="achievements-list"></ul>
  </div>

</div>

<script>
// ================= TIME =================
function updateTime() {
  const now = new Date();
  const formatted = now.toLocaleString();
  document.getElementById("time").innerText = formatted;
}
updateTime();
setInterval(updateTime, 1000);


// ================= STORAGE =================
let name = localStorage.getItem("name") || "Developer";
let gymDay = parseInt(localStorage.getItem("gymDay")) || 8;
let streak = parseInt(localStorage.getItem("streak")) || 0;


// ================= GREETING =================
function updateGreeting() {
  const hour = new Date().getHours();
  let greeting = "Hello";

  if (hour < 12) greeting = "Good morning";
  else if (hour < 18) greeting = "Good afternoon";
  else greeting = "Good evening";

  let greetEl = document.getElementById("greeting");
  if (greetEl) {
    greetEl.innerText = greeting + ", " + name;
  }
}


// ================= NAVIGATION =================
window.showSection = function(sectionId) {
  const sections = [
    "home-section",
    "lessons-section",
    "progress-section",
    "achievements-section"
  ];

  sections.forEach(id => {
    document.getElementById(id).classList.remove("active");
  });

  document.getElementById(sectionId).classList.add("active");

  const buttons = document.querySelectorAll(".bottom-nav button");
  buttons.forEach(btn => btn.classList.remove("active-nav"));

  const map = {
    "home-section": 0,
    "lessons-section": 1,
    "progress-section": 2,
    "achievements-section": 3
  };

  buttons[map[sectionId]].classList.add("active-nav");
};

navigator.serviceWorker.getRegistrations().then(regs => {
  for (let reg of regs) {
    reg.unregister();
  }
});


function backupData() {
  const data = {
    name,
    gymDay,
    streak,
    lessons: JSON.parse(localStorage.getItem("movieLessons")) || [],
    note: localStorage.getItem("disciplineText")
  };

  const json = JSON.stringify(data, null, 2);

  navigator.clipboard.writeText(json)
    .then(() => alert("Backup copied to clipboard ✅"))
    .catch(() => alert("Copy failed ❌"));
}


function restoreData() {
  let input = prompt("Paste your backup JSON:");

  if (!input) return;

  try {
    let data = JSON.parse(input);

    localStorage.setItem("name", data.name || "Developer");
    localStorage.setItem("gymDay", data.gymDay || 0);
    localStorage.setItem("streak", data.streak || 0);
    localStorage.setItem("movieLessons", JSON.stringify(data.lessons || []));
    localStorage.setItem("disciplineText", data.note || "");

    alert("Data restored successfully ✅");

    location.reload();

  } catch (e) {
    alert("Invalid backup ❌");
  }
}

// ================= DAY COUNT =================
function getDayCount() {
  let startDate = new Date("2025-12-14");
  let today = new Date();
  let diff = today - startDate;
  return Math.floor(diff / (1000 * 60 * 60 * 24)) + 1;
}

function saveDailyNote() {
  let day = getDayCount();
  let text = prompt("Write today's note:");

  if (!text) return;

  let notes = JSON.parse(localStorage.getItem("dailyNotes")) || {};
  notes[day] = text;

  localStorage.setItem("dailyNotes", JSON.stringify(notes));

  updateMain();
}


// ================= MAIN =================
function updateMain() {
  let day = getDayCount();

  document.getElementById("dayTitle").innerText =
    "Day " + day + " — Hello, my name is " + name;

  document.getElementById("gymNote").innerText =
    "Day " + gymDay + " at the gym";

  let notes = JSON.parse(localStorage.getItem("dailyNotes")) || {};
let todayNote = notes[day] || "Discipline over trends";

document.getElementById("discipline").innerText = todayNote;

  document.getElementById("consistency").innerText =
    "🎉 Day " + day + " — consistency over quick results";

  document.getElementById("streak").innerText =
    "🔥 Streak: " + streak;

  let percent = day % 100;

  document.getElementById("progress-bar").style.width =
    percent + "%";

  let progressText = document.getElementById("progress-text");
  if (progressText) {
    progressText.innerText = percent + "%";
  }

  updateAchievements(day);
  updateGreeting();
}

function exportData() {
  let data = localStorage;
  let blob = new Blob([JSON.stringify(data)], {type: "application/json"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "devtracker-backup.json";
  a.click();
}


// ================= LESSONS =================
function updateLesson() {
  let lesson = prompt("Enter lesson:");
  if (!lesson) return;

  let lessons = JSON.parse(localStorage.getItem("movieLessons")) || [];
  lessons.push(lesson);

  localStorage.setItem("movieLessons", JSON.stringify(lessons));
  showLessons();
}

function showLessons() {
  let lessons = JSON.parse(localStorage.getItem("movieLessons")) || [];
  let box = document.getElementById("movie-lesson");

  if (!box) return;

  box.innerHTML = "";

  lessons.forEach((lesson, i) => {
    let li = document.createElement("li");
    li.textContent = lesson;

    li.onclick = () => {
      lessons.splice(i, 1);
      localStorage.setItem("movieLessons", JSON.stringify(lessons));
      showLessons();
    };

    box.appendChild(li);
  });
}

function clearLessons() {
  localStorage.setItem("movieLessons", JSON.stringify([]));
  showLessons();
}


// ================= DISCIPLINE =================
function updateNote() {
  let text = prompt("Enter new discipline:");
  if (text) {
    localStorage.setItem("disciplineText", text);
    document.getElementById("discipline").innerText = text;
  }
}


// ================= GYM =================
function increaseGymDay() {
  gymDay++;
  streak++;

  localStorage.setItem("gymDay", gymDay);
  localStorage.setItem("streak", streak);

  updateMain();
}

function resetGymDay() {
  gymDay = 8;
  streak = 0;

  localStorage.setItem("gymDay", gymDay);
  localStorage.setItem("streak", streak);

  updateMain();
}


// ================= NAME =================
function editName() {
  let newName = prompt("Enter your name:");
  if (newName) {
    localStorage.setItem("name", newName);
    name = newName;
    updateMain();
  }
}

function viewDay() {
  let day = prompt("Enter day number:");
  if (!day) return;

  let notes = JSON.parse(localStorage.getItem("dailyNotes")) || {};
  let note = notes[day] || "No record for that day.";

  alert("Day " + day + ":\n\n" + note);
}


// ================= ACHIEVEMENTS =================
function updateAchievements(day) {
  let box = document.getElementById("achievements-list");

  if (!box) return;

  let text = "";

  if (day >= 10) text += "<li>🥉 10 days</li>";
  if (day >= 30) text += "<li>🥈 30 days</li>";
  if (day >= 60) text += "<li>🥇 60 days</li>";
  if (day >= 100) text += "<li>🏆 100 days</li>";

  if (!text) text = "<li>Keep going 💪</li>";

  box.innerHTML = text;
}


// ================= START =================
window.onload = function () {
  updateMain();
  showLessons();
  showSection("home-section");

  let savedText = localStorage.getItem("disciplineText");
  if (savedText) {
    document.getElementById("discipline").innerText = savedText;
  }
};
</script>

<div class="bottom-nav">
  <button onclick="showSection('home-section')">🏠</button>
  <button onclick="showSection('lessons-section')">🧠</button>
  <button onclick="showSection('progress-section')">📈</button>
  <button onclick="showSection('achievements-section')">🏆</button>
</div>

</body>
</html>
